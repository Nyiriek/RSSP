<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/RSSP.ico">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>

    <header class="header">
        <div class="container navbar">


            <a href="index.html" class="logo">

                <img src="images/RSSP.png" alt="Community Party Logo" class="logo-black">
                <img src="images/RSSP.png" alt="Community Party Logo" class="logo-white">

                <span class="party-name">REVIVE SOUTH SUDAN</span>
            </a>

            <div class="menu-toggle" id="menu-toggle">☰</div>

            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="platform.html">Platform</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="manifesto.html">Manifesto</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

        </div>
    </header>

    <section class="hero">
        <h1>Contact Us</h1>
    </section>

    <section class="form-section">
        <form id="contact-form">

            <input type="text" name="name" placeholder="Your Name" required>

            <input type="email" name="email" placeholder="Email" required>

            <textarea name="message" placeholder="Message" required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

        <p id="status"></p>
    </section>

    <!-- CTA -->
    <section class="cta">
        <h2>Join Us in Making a Difference</h2>
        <p>Your voice matters. Get involved and help shape the future of our community.</p>
        <!-- <a href="contact.html" class="btn primary">Contact Us Today</a> -->
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        emailjs.init("YOUR_PUBLIC_KEY");
    </script>

    <script src="js/main.js"></script>
</body>

</html>
